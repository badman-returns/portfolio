<svg viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Widgets are rendering props: a structured answer payload passes through one renderer that draws each component by its shape on a twelve column grid</title>
  <desc>Left: a payload listing components such as donut, split-stat, metric and table with widths. Middle: a single WidgetOutputRenderer that switches on output shape, not widget type. Right: the components laid out as tiles on a twelve column grid. Adding a widget means producing a new shape of answer, not new component code.</desc>

  <rect x="1" y="1" width="878" height="418" rx="16" fill="#0d0d0d" stroke="rgba(255,255,255,0.08)"/>
  <text x="40" y="44" font-size="11" font-weight="700" letter-spacing="1.2" fill="#888888">WIDGETS AS RENDERING PROPS<tspan fill="#555555" font-weight="500" letter-spacing="0">  ·  one renderer, ~30 shapes</tspan></text>

  <!-- payload card -->
  <rect x="40" y="78" width="262" height="250" rx="11" fill="#141414" stroke="rgba(255,255,255,0.10)"/>
  <text x="58" y="104" font-size="11" font-weight="600" fill="#888888">widget answer</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5">
    <text x="58" y="130" fill="#777777">{</text>
    <text x="70" y="150" fill="#888888">components: [</text>
    <text x="86" y="172" fill="#777777">{ <tspan fill="#CDFF52">donut_chart</tspan>, <tspan fill="#bbbbbb">half</tspan> },</text>
    <text x="86" y="194" fill="#777777">{ <tspan fill="#CDFF52">stat_split</tspan>, <tspan fill="#bbbbbb">half</tspan> },</text>
    <text x="86" y="216" fill="#777777">{ <tspan fill="#CDFF52">metric_card</tspan>, <tspan fill="#bbbbbb">full</tspan> },</text>
    <text x="86" y="238" fill="#777777">{ <tspan fill="#CDFF52">data_table</tspan>, <tspan fill="#bbbbbb">full</tspan> }</text>
    <text x="70" y="260" fill="#888888">]</text>
    <text x="58" y="282" fill="#777777">}</text>
  </g>
  <text x="58" y="312" font-size="10.5" fill="#666666">tagged by shape + width</text>

  <!-- renderer -->
  <rect x="338" y="168" width="172" height="74" rx="11" fill="rgba(205,255,82,0.06)" stroke="rgba(205,255,82,0.45)"/>
  <text x="424" y="198" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fafafa">One renderer</text>
  <text x="424" y="216" text-anchor="middle" font-size="10.5" fill="#9bbf4e">switches on shape,</text>
  <text x="424" y="230" text-anchor="middle" font-size="10.5" fill="#9bbf4e">not on widget type</text>

  <!-- arrows -->
  <g stroke="#3a3a3a" stroke-width="1.6" fill="none">
    <path d="M 302 203 l 30 0"/><path d="M 510 203 l 34 0"/>
  </g>
  <g fill="#3a3a3a"><path d="M 332 203 l -7 -4 l 0 8 z"/><path d="M 544 203 l -7 -4 l 0 8 z"/></g>

  <!-- 12-col grid output -->
  <rect x="552" y="78" width="288" height="250" rx="11" fill="#141414" stroke="rgba(255,255,255,0.10)"/>
  <g stroke="rgba(255,255,255,0.04)">
    <line x1="576" y1="92" x2="576" y2="314"/><line x1="600" y1="92" x2="600" y2="314"/>
    <line x1="624" y1="92" x2="624" y2="314"/><line x1="648" y1="92" x2="648" y2="314"/>
    <line x1="672" y1="92" x2="672" y2="314"/><line x1="696" y1="92" x2="696" y2="314"/>
    <line x1="720" y1="92" x2="720" y2="314"/><line x1="744" y1="92" x2="744" y2="314"/>
    <line x1="768" y1="92" x2="768" y2="314"/><line x1="792" y1="92" x2="792" y2="314"/>
    <line x1="816" y1="92" x2="816" y2="314"/>
  </g>
  <!-- donut half -->
  <rect x="566" y="98" width="128" height="86" rx="8" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
  <g transform="translate(630,141)">
    <circle r="22" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="8"/>
    <path d="M 0 -22 A 22 22 0 1 1 -19 11" fill="none" stroke="#CDFF52" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- stat split half -->
  <rect x="698" y="98" width="128" height="86" rx="8" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
  <text x="714" y="132" font-size="18" font-weight="700" fill="#CDFF52">4.2</text>
  <rect x="714" y="146" width="96" height="6" rx="3" fill="#3a3a3a"/>
  <rect x="714" y="158" width="70" height="6" rx="3" fill="#2a2a2a"/>
  <!-- metric full -->
  <rect x="566" y="196" width="260" height="44" rx="8" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
  <rect x="582" y="208" width="60" height="6" rx="3" fill="#3a3a3a"/>
  <text x="582" y="232" font-size="14" font-weight="700" fill="#fafafa">Favorable</text>
  <!-- table full -->
  <rect x="566" y="252" width="260" height="62" rx="8" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
  <g stroke="rgba(255,255,255,0.06)"><line x1="566" y1="272" x2="826" y2="272"/><line x1="566" y1="292" x2="826" y2="292"/></g>
  <g fill="#2a2a2a">
    <rect x="580" y="259" width="90" height="6" rx="3"/><rect x="710" y="259" width="60" height="6" rx="3"/>
    <rect x="580" y="279" width="120" height="6" rx="3"/><rect x="710" y="279" width="44" height="6" rx="3"/>
    <rect x="580" y="299" width="100" height="6" rx="3"/><rect x="710" y="299" width="54" height="6" rx="3"/>
  </g>

  <text x="40" y="360" font-size="12.5" fill="#888888">Add a widget = produce a new <tspan fill="#CDFF52" font-weight="600">shape</tspan> of answer. No new component, no deploy.</text>
</svg>
