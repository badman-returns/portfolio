<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Configured once, serves everything: one scoped dashboard re-derives across every conversation and dataset, filters without rebuilding, and exports the whole surface</title>
  <desc>A single dashboard configuration on the left fans out to many conversations and datasets on the right, each re-derived automatically. Below, two outcomes: slice without rebuilding, and export the whole surface to a slide deck.</desc>

  <rect x="1" y="1" width="878" height="398" rx="16" fill="#0d0d0d" stroke="rgba(255,255,255,0.08)"/>
  <text x="40" y="44" font-size="11" font-weight="700" letter-spacing="1.2" fill="#888888">CONFIGURED ONCE, SERVES EVERYTHING<tspan fill="#555555" font-weight="500" letter-spacing="0">  ·  scope lives on the dashboard, not the widget</tspan></text>

  <!-- config card (lime) -->
  <rect x="44" y="116" width="244" height="150" rx="12" fill="rgba(205,255,82,0.06)" stroke="rgba(205,255,82,0.45)"/>
  <g transform="translate(70,138)">
    <rect x="0" y="0" width="192" height="20" rx="5" fill="#0d0d0d" stroke="rgba(205,255,82,0.30)"/>
    <rect x="0" y="28" width="92" height="48" rx="5" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
    <rect x="100" y="28" width="92" height="48" rx="5" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
  </g>
  <text x="166" y="240" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fafafa">One dashboard config</text>
  <text x="166" y="257" text-anchor="middle" font-size="10.5" fill="#9bbf4e">scoped to a class of work</text>

  <!-- dataset cards -->
  <g>
    <rect x="600" y="78" width="236" height="56" rx="10" fill="#141414" stroke="rgba(255,255,255,0.10)"/>
    <rect x="600" y="154" width="236" height="56" rx="10" fill="#141414" stroke="rgba(255,255,255,0.10)"/>
    <rect x="600" y="230" width="236" height="56" rx="10" fill="#141414" stroke="rgba(255,255,255,0.10)"/>
  </g>
  <g transform="translate(616,92)">
    <rect x="0" y="0" width="44" height="28" rx="4" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
    <line x1="0" y1="14" x2="44" y2="14" stroke="rgba(255,255,255,0.07)"/><line x1="22" y1="0" x2="22" y2="28" stroke="rgba(255,255,255,0.07)"/>
  </g>
  <g transform="translate(616,168)">
    <rect x="0" y="0" width="44" height="28" rx="4" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
    <line x1="0" y1="14" x2="44" y2="14" stroke="rgba(255,255,255,0.07)"/><line x1="22" y1="0" x2="22" y2="28" stroke="rgba(255,255,255,0.07)"/>
  </g>
  <g transform="translate(616,244)">
    <rect x="0" y="0" width="44" height="28" rx="4" fill="#0d0d0d" stroke="rgba(255,255,255,0.10)"/>
    <line x1="0" y1="14" x2="44" y2="14" stroke="rgba(255,255,255,0.07)"/><line x1="22" y1="0" x2="22" y2="28" stroke="rgba(255,255,255,0.07)"/>
  </g>
  <g fill="#cccccc" font-size="12">
    <text x="676" y="100">Conversation / dataset</text>
    <text x="676" y="176">Conversation / dataset</text>
    <text x="676" y="252">Conversation / dataset</text>
  </g>
  <g fill="#777777" font-size="10">
    <text x="676" y="118">re-derived automatically</text>
    <text x="676" y="194">re-derived automatically</text>
    <text x="676" y="270">re-derived automatically</text>
  </g>

  <!-- fan-out arrows -->
  <g stroke="#CDFF52" stroke-width="1.5" fill="none" stroke-opacity="0.65">
    <path d="M 288 176 C 440 150 460 106 596 106"/>
    <path d="M 288 191 C 440 191 460 182 596 182"/>
    <path d="M 288 206 C 440 232 460 258 596 258"/>
  </g>
  <g fill="#CDFF52" fill-opacity="0.8">
    <path d="M 596 106 l -9 -3 l 3 8 z"/><path d="M 596 182 l -9 -3 l 2 8 z"/><path d="M 596 258 l -9 -3 l 1 8 z"/>
  </g>
  <text x="440" y="150" text-anchor="middle" font-size="10.5" fill="#9bbf4e">one config &#8594; every dataset</text>

  <!-- outcome pills -->
  <rect x="44" y="320" width="372" height="48" rx="10" fill="#141414" stroke="rgba(255,255,255,0.10)"/>
  <g transform="translate(64,335)" stroke="#CDFF52" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 0 l 26 0 l -9 11 l 0 10 l -8 4 l 0 -14 z"/>
  </g>
  <text x="104" y="349" font-size="12.5" font-weight="600" fill="#fafafa">Slice without rebuilding</text>
  <text x="104" y="364" font-size="10.5" fill="#777777">filters are real queries on the grid</text>

  <rect x="432" y="320" width="404" height="48" rx="10" fill="#141414" stroke="rgba(255,255,255,0.10)"/>
  <g transform="translate(452,334)" stroke="#CDFF52" stroke-width="1.5" fill="none">
    <rect x="0" y="0" width="28" height="20" rx="2.5"/><line x1="0" y1="6" x2="28" y2="6"/>
  </g>
  <text x="492" y="349" font-size="12.5" font-weight="600" fill="#fafafa">Export the whole surface</text>
  <text x="492" y="364" font-size="10.5" fill="#777777">branded slide deck, no manual assembly</text>
</svg>
